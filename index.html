<!DOCTYPE html>
<html>
<head>
  <title>Healthcare Support App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Healthcare Support System</h1>

<h2>Patient / Volunteer Registration</h2>

<form id="form">
  <input type="text" placeholder="Enter Name" required><br><br>
  <input type="email" placeholder="Enter Email" required><br><br>

  <select>
    <option>Patient</option>
    <option>Volunteer</option>
  </select><br><br>

  <textarea placeholder="Describe your issue or interest"></textarea><br><br>

  <button type="submit">Submit</button>
</form>

<h2>AI Chatbot (FAQ)</h2>

<input type="text" id="userInput" placeholder="Ask something...">
<button onclick="chat()">Send</button>

<p id="botResponse"></p>

<script src="script.js"></script>

</body>
</html>
